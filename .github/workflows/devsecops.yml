name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. SAST (Static Analysis) ──────────────────────────────
  sast:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r . -f txt || true

  # ── 2. Dependency Scanning ─────────────────────────────────
  dependency-scan:
    name: Dependency Scan - Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Safety
        run: pip install safety
      - name: Run Safety Check
        run: safety check -r requirements.txt || true

  # ── 3. Build Docker Image ──────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan]
    steps:
      - uses: actions/checkout@v3
      - name: Build Image
        run: docker build -t devsecops-demo:latest .

  # ── 4. Container Security Scan ─────────────────────────────
  container-scan:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Build Image
        run: docker build -t devsecops-demo:latest .
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-demo:latest
          format: table
          exit-code: '0'

  # ── 5. DAST (Dynamic Analysis) ─────────────────────────────
  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Build & Run App
        run: |
          docker build -t devsecops-demo:latest .
          docker run -d -p 5000:5000 devsecops-demo:latest
          sleep 5
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
